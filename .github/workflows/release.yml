name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (native)
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
          # macOS Intel (native)
          - target: x86_64-apple-darwin
            os: macos-15-intel
            use_cross: false
          # Linux x86_64 (native)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          # Linux ARM64 (cross-compiled via `cross`)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          # github.ref_name is e.g. "v0.2.1" -- strip leading "v"
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build release binary (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)"
          # The Cargo [[bin]] name is "ghidra"; rename to "ghidra-cli" inside
          # the archive so cargo-binstall's bin-dir resolution is trivial.
          cp "target/${TARGET}/release/ghidra" "${STAGE}/ghidra-cli"
          chmod +x "${STAGE}/ghidra-cli"
          ARCHIVE="ghidra-cli-${TARGET}-${VERSION}.tar.gz"
          tar -czvf "${ARCHIVE}" -C "${STAGE}" ghidra-cli
          echo "Created ${ARCHIVE}"
          ls -lh "${ARCHIVE}"
          # Surface for later steps
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  # E8.5: SBOM generation. Produces a CycloneDX 1.5 dependency SBOM
  # from Cargo.lock that ships alongside the binary tarballs. Reviewers
  # / downstream packagers can run `cyclonedx-cli` or similar to inspect
  # exactly what version of every transitive crate is in a release —
  # the same way Sigstore + cosign give them tamper-evidence (E8.4).
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM (JSON + XML)
        # cargo-cyclonedx reads Cargo.lock and emits a CycloneDX-format
        # SBOM. We ship both JSON and XML so downstream consumers can
        # pick whichever their tooling speaks. The default output goes
        # next to Cargo.toml as `bom.{json,xml}`; we rename to embed
        # the crate version so the release page asset list is readable.
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          cargo cyclonedx --format json --override-filename "ghidra-cli-${VERSION}-sbom"
          cargo cyclonedx --format xml  --override-filename "ghidra-cli-${VERSION}-sbom"
          ls -lh "ghidra-cli-${VERSION}-sbom".* || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-cli-sbom
          path: |
            ghidra-cli-*-sbom.json
            ghidra-cli-*-sbom.xml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List staged artifacts
        run: ls -lhR artifacts

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Draft if the release doesn't exist yet; existing releases are
          # updated in-place with the new assets.
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/ghidra-cli-*-sbom.json
            artifacts/ghidra-cli-*-sbom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
